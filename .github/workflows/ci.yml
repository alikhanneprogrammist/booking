# CI: типы → юнит-тесты → интеграция с Postgres → анти-овербукинг → прод-сборка.
name: CI

on:
  push:
    branches: [master]
  pull_request:

defaults:
  run:
    working-directory: booking

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: office2020
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: office2020
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U office2020"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://office2020:ci@localhost:5432/office2020?sslmode=disable
      AUTH_SECRET: ci-only-secret-not-for-production
      TZ: Asia/Almaty
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Migrate + seed
        run: |
          npm run db:migrate
          npm run db:seed

      - name: DB integration tests
        run: npm run test:db

      - name: Anti-overbooking constraint test
        run: npm run db:test:overlap

      - name: Domain script tests
        run: npx tsx scripts/test-domain.ts

      - name: Production build
        run: npm run build
